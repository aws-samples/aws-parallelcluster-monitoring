# Example ParallelCluster 3.x config using aws-parallelcluster-monitoring.
# Tested on alinux2, alinux2023, ubuntu22.04, ubuntu24.04, rhel9.
#
# post-install.sh accepts up to two args:
#   Args:
#     - <ref>         # tag (e.g. v2.1) or branch (e.g. main). Default: v2.1
#     - <repo_slug>   # owner/repo. Default: aws-samples/aws-parallelcluster-monitoring
#
# Testing from a fork:
#   Script: https://raw.githubusercontent.com/<you>/aws-parallelcluster-monitoring/<branch>/post-install.sh
#   Args:
#     - <tag-or-branch>
#     - <you>/aws-parallelcluster-monitoring
#
# IAM: this example uses the least-privilege policy you create with
# iam/render-policy.sh — see iam/README.md. If you have not generated
# that policy yet, the four AWS-managed policies listed in
# `# Quick start (overbroad) alternative` work too; they're just much
# broader than what the monitoring stack actually needs.
HeadNode:
  InstanceType: c5.xlarge
  Networking:
    SubnetId: subnet-123456
    AdditionalSecurityGroups:
      - sg-123456
  Ssh:
    KeyName: keypair
  LocalStorage:
    RootVolume:
      VolumeType: gp3
  CustomActions:
    OnNodeConfigured:
      Script: https://raw.githubusercontent.com/aws-samples/aws-parallelcluster-monitoring/v2.1/post-install.sh
      Args:
        - v2.1
  Iam:
    AdditionalIamPolicies:
      - Policy: arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
      # Least-privilege policy generated by iam/render-policy.sh.
      # Replace <account-id> and <cluster-name> below.
      - Policy: arn:aws:iam::<account-id>:policy/pcluster-monitoring-<cluster-name>
      #
      # Quick start (overbroad) alternative — uncomment these and remove
      # the line above if you haven't run iam/render-policy.sh yet:
      # - Policy: arn:aws:iam::aws:policy/CloudWatchFullAccess
      # - Policy: arn:aws:iam::aws:policy/AWSPriceListServiceFullAccess
      # - Policy: arn:aws:iam::aws:policy/AmazonSSMFullAccess
      # - Policy: arn:aws:iam::aws:policy/AWSCloudFormationReadOnlyAccess
Scheduling:
  Scheduler: slurm
  SlurmQueues:
    - Name: queue0
      AllocationStrategy: lowest-price
      ComputeResources:
        - Name: queue0-compute-resource-0
          Instances:
            - InstanceType: c5n.large
          MinCount: 0
          MaxCount: 4
      Networking:
        SubnetIds:
          - subnet-123456
      ComputeSettings:
        LocalStorage:
          RootVolume:
            VolumeType: gp3
      CustomActions:
        OnNodeConfigured:
          Script: https://raw.githubusercontent.com/aws-samples/aws-parallelcluster-monitoring/v2.1/post-install.sh
          Args:
            - v2.1
      Iam:
        AdditionalIamPolicies:
          - Policy: arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
          # Compute nodes only run node_exporter (and dcgm-exporter on GPU
          # nodes). They don't need any AWS-API permissions beyond SSM
          # session manager. The overbroad policies are HeadNode-only.
Region: us-east-2
Image:
  # alinux2023 is the PC 3.8+ default. alinux2, ubuntu22/24, rhel9 also work.
  Os: alinux2023
Tags:
  - Key: 'Grafana'
    Value: 'true'
