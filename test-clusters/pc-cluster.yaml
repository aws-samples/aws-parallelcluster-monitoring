# ParallelCluster 3.15 test config — v2.7 EFA + Logs validation.
# Region us-east-2, reuses the HPC-Prod-Network VPC + subnets and the
# existing 12TB FSx Lustre.
#
# Layout (chosen to actually exercise the v2.7 features):
#   - HeadNode  t3.medium       — runs Grafana/Prometheus; validates the
#                                 new Cluster Logs dashboard (CloudWatch).
#   - hpc queue 1x hpc8a.96xlarge (EFA) — pure-EFA HPC node; validates the
#                                 new EFA RDMA / retransmit / WR-error panels.
#   - gpu queue 1x g6e.16xlarge  (EFA + 1x L40S) — validates EFA metrics
#                                 alongside GPU/DCGM (64 vCPU = G quota cap).
#
# Post-install pulls the development-2.7 branch of the monitoring stack.
#
# /home is managed by ParallelCluster via SharedStorageType=Efs. FSx
# Lustre is mounted at /shared. EFA requires a single subnet + a cluster
# placement group per compute resource.

Region: us-east-2

Image:
  Os: alinux2023

HeadNode:
  InstanceType: t3.medium
  Networking:
    SubnetId: subnet-0c32d359f2a1f38bd  # public subnet A (so SSM port-forward works without NAT-only routing)
  Ssh:
    KeyName: Nicola-Ireland
  LocalStorage:
    RootVolume:
      VolumeType: gp3
      Size: 50
  SharedStorageType: Efs
  CustomActions:
    OnNodeConfigured:
      Script: https://raw.githubusercontent.com/aws-samples/aws-parallelcluster-monitoring/development-2.7/post-install.sh
      Args:
        - development-2.7
  Iam:
    AdditionalIamPolicies:
      - Policy: arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
      - Policy: arn:aws:iam::aws:policy/CloudWatchFullAccess
      - Policy: arn:aws:iam::aws:policy/AWSPriceListServiceFullAccess
      - Policy: arn:aws:iam::aws:policy/AmazonSSMFullAccess
      - Policy: arn:aws:iam::aws:policy/AWSCloudFormationReadOnlyAccess

Scheduling:
  Scheduler: slurm
  SlurmQueues:
    - Name: hpc
      AllocationStrategy: lowest-price
      ComputeResources:
        - Name: hpc8a
          Instances:
            - InstanceType: hpc8a.96xlarge
          MinCount: 1
          MaxCount: 2
          Efa:
            Enabled: true
      Networking:
        SubnetIds:
          - subnet-00643c21d668273ca  # private subnet A (us-east-2b)
        PlacementGroup:
          Enabled: true
      ComputeSettings:
        LocalStorage:
          RootVolume:
            VolumeType: gp3
      CustomActions:
        OnNodeConfigured:
          Script: https://raw.githubusercontent.com/aws-samples/aws-parallelcluster-monitoring/development-2.7/post-install.sh
          Args:
            - development-2.7
      Iam:
        AdditionalIamPolicies:
          - Policy: arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore

    - Name: gpu
      AllocationStrategy: lowest-price
      ComputeResources:
        - Name: g6e16xl
          Instances:
            - InstanceType: g6e.16xlarge
          MinCount: 1
          MaxCount: 1
          Efa:
            Enabled: true
      Networking:
        SubnetIds:
          - subnet-00643c21d668273ca  # private subnet A (us-east-2b)
        PlacementGroup:
          Enabled: true
      ComputeSettings:
        LocalStorage:
          RootVolume:
            VolumeType: gp3
      CustomActions:
        OnNodeConfigured:
          Script: https://raw.githubusercontent.com/aws-samples/aws-parallelcluster-monitoring/development-2.7/post-install.sh
          Args:
            - development-2.7
      Iam:
        AdditionalIamPolicies:
          - Policy: arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore

# Reuse the existing 12TB FSx Lustre as /shared. /home is handled by
# HeadNode.SharedStorageType=Efs above (PC creates a managed EFS).
SharedStorage:
  - Name: fsx-shared
    StorageType: FsxLustre
    MountDir: /shared
    FsxLustreSettings:
      FileSystemId: fs-0473d212290c9a14d

Tags:
  - Key: aws-parallelcluster-monitoring-test
    Value: pc

Monitoring:
  Logs:
    CloudWatch:
      Enabled: true
      RetentionInDays: 7
