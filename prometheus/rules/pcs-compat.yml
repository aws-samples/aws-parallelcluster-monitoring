#
# Recording rules that translate AWS PCS native Slurm OpenMetrics to the
# metric names the existing dashboards expect (rivosinc exporter names
# used by ParallelCluster).
#
# This lets the same dashboards work for both platforms.
#
groups:
  - name: pcs_slurm_compat
    interval: 30s
    rules:
      # slurm_node_count_per_state{state="idle|alloc|mix|down|drain"}
      # Source: slurm_nodes_{alloc,idle,mixed,down,drain}
      - record: slurm_node_count_per_state
        expr: slurm_nodes_idle
        labels: {state: idle}
      - record: slurm_node_count_per_state
        expr: slurm_nodes_alloc
        labels: {state: alloc}
      - record: slurm_node_count_per_state
        expr: slurm_nodes_mixed
        labels: {state: mix}
      - record: slurm_node_count_per_state
        expr: slurm_nodes_down
        labels: {state: down}
      - record: slurm_node_count_per_state
        expr: slurm_nodes_drain
        labels: {state: drain}

      # slurm_cpus_per_state{state="idle|alloc"}
      # Source: sum of slurm_node_cpus_{idle,alloc}
      - record: slurm_cpus_per_state
        expr: sum(slurm_node_cpus_idle)
        labels: {state: idle}
      - record: slurm_cpus_per_state
        expr: sum(slurm_node_cpus_alloc)
        labels: {state: alloc}

      # slurm_job_node — rivosinc-style metric mapping job_id → node_name.
      # PCS's openmetrics jobs endpoint gives aggregate counts, not
      # per-job labels, so we can't synthesize this with a recording
      # rule. Instead, the slurm-job-nodes.sh textfile collector
      # (installed on both ParallelCluster head nodes and PCS login
      # nodes) shells out to `squeue` every 30s and produces the
      # metric directly. See custom-metrics/slurm-job-nodes.sh.
