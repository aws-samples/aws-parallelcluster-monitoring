global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 15s

scrape_configs:
  - job_name: 'slurm_exporter'
    scrape_interval: 30s
    scrape_timeout: 30s
    static_configs:
      - targets: ['localhost:9092']

  - job_name: 'pushgateway'
    honor_labels: true
    static_configs:
      - targets: ['localhost:9091']

  - job_name: 'prometheus_server'
    scrape_interval: 5s
    static_configs:
      - targets: ['localhost:9090']

  # Compute fleet: node_exporter on 9100, DCGM exporter on 9400 for GPU nodes.
  #
  # Filter on the `parallelcluster:node-type=Compute` tag (present on
  # every compute instance since PC 3.0). This replaces the legacy
  # instance-type allowlist, which had to grow with every new GPU
  # family AWS launches (p4de, p5, p5e, p5en, g6, g6e, ...).
  #
  # `parallelcluster:cluster-name` scopes discovery to this cluster so
  # multiple PC clusters in the same VPC don't cross-scrape each other.
  # __PC_CLUSTER_NAME__ is substituted by the installer.
  #
  # Port 9400 (DCGM) is also filtered by the same tag. Non-GPU compute
  # nodes will return up=0 for the 9400 scrape — Prometheus tolerates
  # this and DCGM-specific dashboards filter on metric presence, so
  # the noise is harmless and bounded.
  - job_name: 'ec2_instances'
    scrape_interval: 5s
    ec2_sd_configs:
      - port: 9100
        region: __AWS_REGION__
        refresh_interval: 10s
        filters:
          - name: instance-state-name
            values: [running]
          - name: tag:parallelcluster:cluster-name
            values: ['__PC_CLUSTER_NAME__']
          - name: tag:parallelcluster:node-type
            values: [Compute, HeadNode]
      - port: 9400
        region: __AWS_REGION__
        refresh_interval: 10s
        filters:
          - name: instance-state-name
            values: [running]
          - name: tag:parallelcluster:cluster-name
            values: ['__PC_CLUSTER_NAME__']
          - name: tag:parallelcluster:node-type
            values: [Compute]
    relabel_configs:
      - source_labels: [__meta_ec2_tag_Name]
        target_label: instance_name
      - source_labels: [__meta_ec2_tag_Application]
        target_label: instance_grafana
      - source_labels: [__meta_ec2_instance_id]
        target_label: instance_id
      - source_labels: [__meta_ec2_availability_zone]
        target_label: instance_az
      - source_labels: [__meta_ec2_instance_state]
        target_label: instance_state
      - source_labels: [__meta_ec2_instance_type]
        target_label: instance_type
      - source_labels: [__meta_ec2_vpc_id]
        target_label: instance_vpc
      # ParallelCluster sets these on every queue compute node.
      # 'pc_queue' (not 'queue') to avoid collision with node_exporter
      # series like node_disk_io_now where 'queue' is already a label.
      - source_labels: [__meta_ec2_tag_parallelcluster_queue_name]
        target_label: pc_queue
      - source_labels: [__meta_ec2_tag_parallelcluster_node_type]
        target_label: pc_node_type
