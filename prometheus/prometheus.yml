global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 15s

scrape_configs:
  - job_name: 'slurm_exporter'
    scrape_interval: 30s
    scrape_timeout: 30s
    static_configs:
      - targets: ['localhost:9092']

  - job_name: 'pushgateway'
    honor_labels: true
    static_configs:
      - targets: ['localhost:9091']

  - job_name: 'prometheus_server'
    scrape_interval: 5s
    static_configs:
      - targets: ['localhost:9090']

  # Compute fleet: node_exporter on 9100, DCGM exporter on 9400 for GPU nodes.
  # NOTE (Phase 3): this instance-type allowlist should be replaced with a
  # tag-based filter on parallelcluster:node-type once we drop support for
  # ParallelCluster <3.7. For now, keep the list and cover all current
  # GPU / accelerator families.
  - job_name: 'ec2_instances'
    scrape_interval: 5s
    ec2_sd_configs:
      - port: 9100
        region: __AWS_REGION__
        refresh_interval: 10s
      - port: 9400
        region: __AWS_REGION__
        refresh_interval: 10s
        filters:
          - name: instance-state-name
            values:
              - running
          - name: tag:Name
            values:
              - Compute
          - name: instance-type
            values:
              # P-family (training)
              - p2.xlarge
              - p2.8xlarge
              - p2.16xlarge
              - p3.2xlarge
              - p3.8xlarge
              - p3.16xlarge
              - p3dn.24xlarge
              - p4d.24xlarge
              - p4de.24xlarge
              - p5.48xlarge
              - p5e.48xlarge
              - p5en.48xlarge
              # G-family (graphics / inference)
              - g3s.xlarge
              - g3.4xlarge
              - g3.8xlarge
              - g3.16xlarge
              - g4dn.xlarge
              - g4dn.2xlarge
              - g4dn.4xlarge
              - g4dn.8xlarge
              - g4dn.16xlarge
              - g4dn.12xlarge
              - g4dn.metal
              - g5.xlarge
              - g5.2xlarge
              - g5.4xlarge
              - g5.8xlarge
              - g5.12xlarge
              - g5.16xlarge
              - g5.24xlarge
              - g5.48xlarge
              - g6.xlarge
              - g6.2xlarge
              - g6.4xlarge
              - g6.8xlarge
              - g6.12xlarge
              - g6.16xlarge
              - g6.24xlarge
              - g6.48xlarge
              - g6e.xlarge
              - g6e.2xlarge
              - g6e.4xlarge
              - g6e.8xlarge
              - g6e.12xlarge
              - g6e.16xlarge
              - g6e.24xlarge
              - g6e.48xlarge
    relabel_configs:
      - source_labels: [__meta_ec2_tag_Name]
        target_label: instance_name
      - source_labels: [__meta_ec2_tag_Application]
        target_label: instance_grafana
      - source_labels: [__meta_ec2_instance_id]
        target_label: instance_id
      - source_labels: [__meta_ec2_availability_zone]
        target_label: instance_az
      - source_labels: [__meta_ec2_instance_state]
        target_label: instance_state
      - source_labels: [__meta_ec2_instance_type]
        target_label: instance_type
      - source_labels: [__meta_ec2_vpc_id]
        target_label: instance_vpc
