#
# Amazon RES (Research and Engineering Studio) VDI discovery.
#
# This snippet is APPENDED to prometheus.yml by installer/install.sh ONLY
# when RES_ENVIRONMENT_NAME is set on the monitoring (head/login) node. It is
# never active otherwise, so non-RES deployments are unaffected.
#
# RES tags every VDI instance with `res:EnvironmentName` (and project/owner
# tags). We discover those instances by tag and force a constant
# instance_name="RES" label so they get their own dashboards (RES Node List /
# RES Node Details), separate from the Slurm compute fleet.
#
# __AWS_REGION__ and __RES_ENVIRONMENT_NAME__ are substituted by the installer.
  - job_name: 'res_instances'
    scrape_interval: 5s
    ec2_sd_configs:
      # node_exporter on every RES VDI.
      - port: 9100
        region: __AWS_REGION__
        refresh_interval: 10s
        filters:
          - name: instance-state-name
            values: [running]
          - name: tag:res:EnvironmentName
            values: ['__RES_ENVIRONMENT_NAME__']
      # DCGM exporter on GPU VDIs (e.g. g5/g6). Non-GPU desktops simply
      # report up=0 for 9400, which Prometheus tolerates.
      - port: 9400
        region: __AWS_REGION__
        refresh_interval: 10s
        filters:
          - name: instance-state-name
            values: [running]
          - name: tag:res:EnvironmentName
            values: ['__RES_ENVIRONMENT_NAME__']
    relabel_configs:
      # Constant marker so RES desktops get their own dashboards. RES sets
      # the EC2 Name tag per-desktop, so (unlike the PC job) we must NOT
      # derive instance_name from it.
      - target_label: instance_name
        replacement: RES
      - source_labels: [__meta_ec2_instance_id]
        target_label: instance_id
      - source_labels: [__meta_ec2_availability_zone]
        target_label: instance_az
      - source_labels: [__meta_ec2_instance_state]
        target_label: instance_state
      - source_labels: [__meta_ec2_instance_type]
        target_label: instance_type
      - source_labels: [__meta_ec2_vpc_id]
        target_label: instance_vpc
      # RES metadata for the node-list table. res:Project and
      # res:EnvironmentName are documented RES tags that propagate to every
      # VDI instance. NOTE: RES does NOT tag instances with the desktop owner
      # (the owner is held in RES's database, not as an EC2 tag), so there is
      # deliberately no res_owner here — the Name tag (res_desktop) is the
      # human-readable per-desktop identifier RES assigns. Project is the
      # reliable attribution column.
      - source_labels: [__meta_ec2_tag_res_Project]
        target_label: res_project
      - source_labels: [__meta_ec2_tag_Name]
        target_label: res_desktop
