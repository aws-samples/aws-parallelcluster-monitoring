#
# Prometheus configuration for AWS PCS clusters.
# Differences vs ParallelCluster:
#   - No slurm_exporter container — we scrape Slurm's native OpenMetrics
#     endpoint on the slurmctld (port 6817) exposed by PCS when
#     MetricsType=metrics/openmetrics + CommunicationParameters=enable_http
#     are set on the cluster.
#   - No DCGM port 9400 filter (added later when GPU support lands)
#
global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 15s

rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:
  # Slurm native OpenMetrics (requires Slurm 25.11+ on PCS).
  # __SLURMCTLD_IP__ is substituted by the installer.
  - job_name: 'slurm_openmetrics'
    scrape_interval: 30s
    metrics_path: /metrics/nodes
    static_configs:
      - targets: ['__SLURMCTLD_IP__:6817']
        labels: {slurm_endpoint: 'nodes'}

  - job_name: 'slurm_openmetrics_jobs'
    scrape_interval: 30s
    metrics_path: /metrics/jobs
    static_configs:
      - targets: ['__SLURMCTLD_IP__:6817']
        labels: {slurm_endpoint: 'jobs'}

  - job_name: 'slurm_openmetrics_partitions'
    scrape_interval: 30s
    metrics_path: /metrics/partitions
    static_configs:
      - targets: ['__SLURMCTLD_IP__:6817']
        labels: {slurm_endpoint: 'partitions'}

  - job_name: 'slurm_openmetrics_scheduler'
    scrape_interval: 30s
    metrics_path: /metrics/scheduler
    static_configs:
      - targets: ['__SLURMCTLD_IP__:6817']
        labels: {slurm_endpoint: 'scheduler'}

  # Per-user / per-account metrics. Slurm's docs explicitly warn this
  # endpoint is unbounded — every (user, state) and (account, state)
  # combination is a separate time series. On a large multi-tenant
  # cluster you can easily land in 100k+ series. Scrape it less often
  # and only enable it if you actually use the user/account dashboards.
  # Comment this whole block out if you see Prometheus memory blow up.
  - job_name: 'slurm_openmetrics_jobs_users_accts'
    scrape_interval: 120s
    scrape_timeout: 60s
    metrics_path: /metrics/jobs-users-accts
    static_configs:
      - targets: ['__SLURMCTLD_IP__:6817']
        labels: {slurm_endpoint: 'jobs-users-accts'}

  - job_name: 'pushgateway'
    honor_labels: true
    static_configs:
      - targets: ['localhost:9091']

  - job_name: 'cloudwatch_exporter'
    scrape_interval: 60s
    scrape_timeout: 55s
    static_configs:
      - targets: ['localhost:9106']

  - job_name: 'prometheus_server'
    scrape_interval: 5s
    static_configs:
      - targets: ['localhost:9090']

  # Login node (this host) — scraped via static_configs because the
  # login node isn't part of a PCS compute-node-group and therefore
  # doesn't get the aws:pcs:cluster-id tag that EC2 SD filters on.
  - job_name: 'login_node'
    scrape_interval: 5s
    static_configs:
      - targets: ['localhost:9100']
        labels:
          instance_name: HeadNode
          instance_id: __LOGIN_INSTANCE_ID__

  # EC2 service discovery for node_exporter (port 9100) and
  # DCGM exporter (port 9400, GPU nodes only).
  #
  # Filters target PCS instances only (by tag aws:pcs:cluster-id).
  # Keeping the DCGM filter small — any modern GPU/accelerator instance
  # type will be scraped; non-GPU types are ignored at connect time.
  - job_name: 'ec2_instances'
    scrape_interval: 5s
    ec2_sd_configs:
      - port: 9100
        region: __AWS_REGION__
        refresh_interval: 10s
        filters:
          - name: tag:aws:pcs:cluster-id
            values: ['__PCS_CLUSTER_ID__']
          - name: instance-state-name
            values: [running]
      - port: 9400
        region: __AWS_REGION__
        refresh_interval: 10s
        filters:
          - name: tag:aws:pcs:cluster-id
            values: ['__PCS_CLUSTER_ID__']
          - name: instance-state-name
            values: [running]
    relabel_configs:
      # Drop login/head nodes from EC2 service discovery. They are already
      # scraped by the static 'login_node' job (localhost:9100) with
      # instance_name=HeadNode. On PCS the login node group also carries the
      # aws:pcs:cluster-id tag this job filters on, so without this drop the
      # login node is discovered here too and scraped a second time, producing
      # duplicate node_uname_info series for one instance_id and breaking the
      # Login Node dashboards' `* on(instance_id) group_left(...)` joins with
      # "many-to-many matching not allowed" (HTTP 422). See issue #45.
      #
      # Login nodes are identified by the monitoring-role=login tag (the same
      # tag installer/platform/pcs.sh reads via IMDS to pick the node type).
      # Nodes without a monitoring-role tag (legacy clusters, or CNGs deployed
      # with MonitoringRole=none) present an empty string here, which does NOT
      # match 'login', so they are kept and treated as compute. This frees the
      # EC2 'Name' tag for arbitrary operator use.
      - source_labels: [__meta_ec2_tag_monitoring_role]
        regex: login
        action: drop
      - source_labels: [__meta_ec2_tag_aws_pcs_compute_node_group_id]
        target_label: node_group_id
      - source_labels: [__meta_ec2_instance_id]
        target_label: instance_id
      - source_labels: [__meta_ec2_availability_zone]
        target_label: instance_az
      - source_labels: [__meta_ec2_instance_state]
        target_label: instance_state
      - source_labels: [__meta_ec2_instance_type]
        target_label: instance_type
      - source_labels: [__meta_ec2_vpc_id]
        target_label: instance_vpc
      # Everything reaching this point is a compute node (login was dropped
      # above). The Grafana dashboards filter on the literal instance_name
      # values "HeadNode" (served only by the static 'login_node' job) and
      # "Compute" (served here), so we hardcode instance_name=Compute rather
      # than deriving it from the Name tag. This frees the Name tag for
      # arbitrary use and is backward compatible: legacy compute nodes
      # (Name=Compute) resolve to the same value.
      - source_labels: []
        target_label: instance_name
        replacement: Compute
      # Surface the PCS compute-node-group ID as 'pc_queue' so the same
      # dashboards (which group/sort by queue on PC) work on PCS.
      # (Avoiding the bare 'queue' label name because node_exporter
      # already uses it on disk-IO metrics.)
      - source_labels: [__meta_ec2_tag_aws_pcs_compute_node_group_id]
        target_label: pc_queue
